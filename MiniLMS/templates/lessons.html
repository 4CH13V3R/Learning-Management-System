<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lessons - Mini LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            mix-blend-mode: difference;
        }

        .cursor-follower {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(108,92,231,0.6) 0%, rgba(162,155,254,0.3) 50%, transparent 70%);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease-out;
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 { width: 500px; height: 500px; background: rgba(108, 92, 231, 0.15); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: rgba(162, 155, 254, 0.12); bottom: -10%; right: -10%; animation-delay: 3s; }
        .orb-3 { width: 300px; height: 300px; background: rgba(0, 206, 201, 0.1); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .navbar {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(30px);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(108, 92, 231, 0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-brand {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; gap: 10px; align-items: center; }

        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            background: var(--gradient);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
        }

        #user-info {
            font-weight: 600;
            color: #a29bfe;
            padding: 10px 20px;
            background: rgba(108, 92, 231, 0.15);
            border-radius: 50px;
            font-size: 14px;
            border: 1px solid rgba(162, 155, 254, 0.3);
        }

        .btn-logout {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            animation: float 4s ease-in-out infinite;
        }

        .page-header p { font-size: 20px; color: rgba(255,255,255,0.6); }

        .lessons-container { display: flex; flex-direction: column; gap: 50px; }

        .course-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 45px;
            transition: all 0.4s ease;
        }

        .course-section:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(108, 92, 231, 0.3);
            box-shadow: 0 25px 50px rgba(108, 92, 231, 0.15);
        }

        .course-section h2 {
            font-size: 30px;
            color: #a29bfe;
            margin-bottom: 30px;
            padding-bottom: 18px;
            border-bottom: 2px solid rgba(255,255,255,0.08);
        }

        .lesson-card {
            display: flex;
            gap: 25px;
            padding: 28px;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            margin-bottom: 20px;
            transition: all 0.4s ease;
            align-items: flex-start;
            border: 1px solid transparent;
        }

        .lesson-card:hover {
            background: rgba(255,255,255,0.05);
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.1);
            transform: translateX(12px);
            border-color: rgba(108, 92, 231, 0.2);
        }

        .lesson-number {
            width: 55px;
            height: 55px;
            background: var(--gradient);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }

        .lesson-content h3 {
            font-size: 22px;
            color: white;
            margin-bottom: 12px;
        }

        .lesson-content p {
            color: rgba(255,255,255,0.55);
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .cursor, .cursor-follower { display: none; }
            .navbar { flex-direction: column; gap: 15px; padding: 20px; }
            .page-header h1 { font-size: 38px; }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <nav class="navbar">
        <div class="nav-brand">Mini LMS</div>
        <div class="nav-links">
            <a href="#" onclick="window.location.href='/courses/'">Courses</a>
            <a href="#" onclick="window.location.href='/lessons/'">Lessons</a>
            <a href="#" onclick="window.location.href='/assignments/'">Assignments</a>
            <span id="user-info"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📖 Learning Modules</h1>
            <p>Explore lessons organized by course</p>
        </div>
        
        <div class="lessons-container" id="lessons-container">
            <!-- Lessons loaded dynamically -->
        </div>
    </div>

    <script>
        // Cursor Animation
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        let mouseX = 0, mouseY = 0, followerX = 0, followerY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = mouseX - 10 + 'px';
            cursor.style.top = mouseY - 10 + 'px';
        });

        function animateFollower() {
            followerX += (mouseX - followerX) * 0.1;
            followerY += (mouseY - followerY) * 0.1;
            follower.style.left = followerX - 20 + 'px';
            follower.style.top = followerY - 20 + 'px';
            requestAnimationFrame(animateFollower);
        }
        animateFollower();

        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/';

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('user-info').textContent = `Welcome, ${user.username} (${user.role})`;

        async function loadLessons() {
            try {
                const response = await fetch('/api/courses/lessons/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const lessons = await response.json();
                
                const lessonsByCourse = {};
                lessons.forEach(lesson => {
                    const courseTitle = lesson.course_title || lesson.course?.title || 'Unknown Course';
                    if (!lessonsByCourse[courseTitle]) {
                        lessonsByCourse[courseTitle] = [];
                    }
                    lessonsByCourse[courseTitle].push(lesson);
                });

                const container = document.getElementById('lessons-container');
                container.innerHTML = Object.entries(lessonsByCourse).map(([courseTitle, courseLessons], i) => `
                    <div class="course-section" style="animation-delay: ${i * 0.15}s">
                        <h2>📚 ${courseTitle}</h2>
                        ${courseLessons.map((lesson, j) => `
                            <div class="lesson-card" style="animation-delay: ${j * 0.1}s">
                                <div class="lesson-number">${lesson.order}</div>
                                <div class="lesson-content">
                                    <h3>${lesson.title}</h3>
                                    <p>${lesson.content}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading lessons:', error);
            }
        }
        loadLessons();

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }
    </script>
</body>
</html>
