<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Mini LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #00cec9;
            --dark: #2d3436;
            --light: #dfe6e9;
            --white: #ffffff;
            --gray: #636e72;
            --gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            mix-blend-mode: difference;
        }

        .cursor-follower {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(108,92,231,0.6) 0%, rgba(162,155,254,0.3) 50%, transparent 70%);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease-out;
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(108, 92, 231, 0.15);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(162, 155, 254, 0.12);
            bottom: -10%;
            right: -10%;
            animation-delay: 3s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(0, 206, 201, 0.1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(30px);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(108, 92, 231, 0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-brand {
            fontpx;
            font-size: 28-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            background: var(--gradient);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
        }

        #user-info {
            font-weight: 600;
            color: #a29bfe;
            padding: 10px 20px;
            background: rgba(108, 92, 231, 0.15);
            border-radius: 50px;
            font-size: 14px;
            border: 1px solid rgba(162, 155, 254, 0.3);
        }

        .btn-logout {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.4);
        }

        /* Container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            animation: float 4s ease-in-out infinite;
        }

        .page-header p {
            font-size: 20px;
            color: rgba(255,255,255,0.6);
        }

        /* Course Cards */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 35px;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .course-card:hover {
            transform: translateY(-12px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(108, 92, 231, 0.3);
            box-shadow: 0 25px 50px rgba(108, 92, 231, 0.2);
        }

        .course-card:hover::before {
            transform: scaleX(1);
        }

        .course-icon {
            font-size: 56px;
            margin-bottom: 22px;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        .course-card h3 {
            font-size: 26px;
            color: white;
            margin-bottom: 15px;
        }

        .course-description {
            color: rgba(255,255,255,0.6);
            line-height: 1.8;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .course-meta {
            display: flex;
            gap: 20px;
            color: #a29bfe;
            font-weight: 500;
            font-size: 14px;
            flex-wrap: wrap;
        }

        .course-meta span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Add Course Button */
        .btn-add {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.4);
            transition: all 0.4s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add:hover {
            transform: scale(1.15) rotate(90deg);
            box-shadow: 0 20px 45px rgba(108, 92, 231, 0.5);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-card {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 50px;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-card h2 {
            font-size: 30px;
            color: white;
            margin-bottom: 35px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            font-size: 15px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 18px 22px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            background: rgba(255,255,255,0.03);
            color: white;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #6c5ce7;
            box-shadow: 0 0 0 5px rgba(108,92,231,0.15);
            background: rgba(255,255,255,0.05);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }

        .form-actions .btn {
            flex: 1;
            padding: 18px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-actions .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(108,92,231,0.35);
        }

        .form-actions .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        @media (max-width: 768px) {
            .cursor, .cursor-follower { display: none; }
            .navbar { flex-direction: column; gap: 15px; padding: 20px; }
            .page-header h1 { font-size: 38px; }
            .courses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <nav class="navbar">
        <div class="nav-brand">Mini LMS</div>
        <div class="nav-links">
            <a href="#" onclick="window.location.href='/courses/'">Courses</a>
            <a href="#" onclick="window.location.href='/lessons/'">Lessons</a>
            <a href="#" onclick="window.location.href='/assignments/'">Assignments</a>
            <span id="user-info"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📚 Available Courses</h1>
            <p>Explore our comprehensive course catalog</p>
        </div>
        
        <div class="courses-grid" id="courses-grid">
            <!-- Courses loaded dynamically -->
        </div>
    </div>

    <button class="btn-add" onclick="showModal()" title="Add Course">+</button>

    <!-- Add Course Modal -->
    <div class="modal" id="course-modal">
        <div class="modal-card">
            <h2>Create New Course</h2>
            <form id="course-form">
                <div class="form-group">
                    <label>Course Title</label>
                    <input type="text" id="course-title" placeholder="Enter course title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="course-description" rows="4" placeholder="Enter course description" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="hideModal()">Cancel</button>
                    <button type="submit" class="btn">Create Course</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Cursor Animation
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        let mouseX = 0, mouseY = 0, followerX = 0, followerY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = mouseX - 10 + 'px';
            cursor.style.top = mouseY - 10 + 'px';
        });

        function animateFollower() {
            followerX += (mouseX - followerX) * 0.1;
            followerY += (mouseY - followerY) * 0.1;
            follower.style.left = followerX - 20 + 'px';
            follower.style.top = followerY - 20 + 'px';
            requestAnimationFrame(animateFollower);
        }
        animateFollower();

        // Check auth
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/';

        // Load user info
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('user-info').textContent = `Welcome, ${user.username} (${user.role})`;

        // Load courses
        async function loadCourses() {
            try {
                const response = await fetch('/api/courses/courses/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const courses = await response.json();
                const grid = document.getElementById('courses-grid');
                grid.innerHTML = courses.map((course, i) => `
                    <div class="course-card" style="animation-delay: ${i * 0.1}s">
                        <div class="course-icon">${['📖', '💻', '🎨', '📊', '🔬', '🌐'][i % 6]}</div>
                        <h3>${course.title}</h3>
                        <p class="course-description">${course.description}</p>
                        <div class="course-meta">
                            <span>👤 ${course.instructor?.username || 'Unknown'}</span>
                            <span>📅 ${new Date(course.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading courses:', error);
            }
        }
        loadCourses();

        // Modal functions
        function showModal() { document.getElementById('course-modal').classList.add('active'); }
        function hideModal() { document.getElementById('course-modal').classList.remove('active'); }

        // Create course
        document.getElementById('course-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                title: document.getElementById('course-title').value,
                description: document.getElementById('course-description').value,
                instructor_id: user.id
            };

            try {
                const response = await fetch('/api/courses/courses/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    hideModal();
                    loadCourses();
                }
            } catch (error) {
                console.error('Error creating course:', error);
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }
    </script>
</body>
</html>
